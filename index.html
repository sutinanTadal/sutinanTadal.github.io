<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppLab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Background orbs -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Navbar -->
<nav id="navbar">
  <a class="nav-logo" onclick="showHome()">
    <div class="logo-icon">🎮</div>
    AppLab
  </a>
  <div class="nav-divider"></div>
  <div id="nav-game-buttons"></div>
  <div class="nav-spacer"></div>
  <button class="nav-home-btn" onclick="showHome()">Home</button>
</nav>

<!-- Content -->
<div id="content">
  <!-- Home screen -->
  <div id="home" class="fade">
    <div class="home-hero">
      <h1>AppLab</h1>
      <p>A collection of apps and mini-games to play in your browser. Pick one below to get started.</p>
    </div>
    <div class="games-grid" id="games-grid"></div>
  </div>

  <!-- Game iframe view -->
  <div id="game-view">
    <iframe id="game-frame" src="" title="Game"></iframe>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
