<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SET Game — Liquid Glass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Toast -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="start-card glass">
      <div class="start-title">SET</div>
      <div class="start-sub">Find groups of three</div>
      <div class="start-rules">
        Each SET of 3 cards must have every attribute<br>
        (number · shape · color · shading) either<br>
        all the same — or all different.
      </div>
      <button class="btn btn-start" onclick="startGame()"><span>Start Game</span></button>
    </div>
  </div>

  <!-- Game over modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-emoji" id="modalEmoji">🏆</div>
      <div class="modal-title" id="modalTitle">Game Over</div>
      <div class="modal-rating" id="modalRating">★★★☆☆</div>

      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-label">SETs Found</div>
          <div class="modal-stat-value purple" id="modalScore">0</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Time</div>
          <div class="modal-stat-value blue" id="modalTime">0:00</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Hints</div>
          <div class="modal-stat-value yellow" id="modalHints">0</div>
        </div>
      </div>

      <div class="report-divider">Performance</div>
      <div class="report-rows">
        <div class="report-row">
          <span class="report-key">Accuracy</span>
          <span class="report-val" id="modalAccuracy">—</span>
        </div>
        <div class="report-row">
          <span class="report-key">Speed</span>
          <span class="report-val" id="modalSpeed">—</span>
        </div>
        <div class="report-row">
          <span class="report-key">Wrong guesses</span>
          <span class="report-val" id="modalMisses">—</span>
        </div>
      </div>

      <button class="btn btn-new" onclick="resetToStart()"><span>&#8635; Play Again</span></button>
    </div>
  </div>

  <div class="app">

    <!-- Header -->
    <div class="glass header">
      <div class="title">SET</div>
      <div class="stats">
        <div class="stat-pill" id="stat-score">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="scoreVal">0</div>
        </div>
        <div class="stat-pill" id="stat-time">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timeVal">0:00</div>
        </div>
        <div class="stat-pill" id="stat-deck">
          <div class="stat-label">Deck</div>
          <div class="stat-value" id="deckVal">—</div>
        </div>
        <div class="stat-pill" id="stat-hints">
          <div class="stat-label">Hints</div>
          <div class="stat-value" id="hintsVal">0</div>
        </div>
      </div>
    </div>

    <!-- Board -->
    <div class="glass board-wrap">
      <div class="board" id="board"></div>
      <div class="no-set-notice" id="noSetNotice"></div>
    </div>

    <!-- Footer -->
    <div class="glass footer">
      <button class="btn btn-hint" id="btnHint" onclick="doHint()" disabled><span>Hint</span></button>
      <button class="btn btn-new"  id="btnNew"  onclick="resetToStart()"><span>&#8635; New Game</span></button>
      <button class="btn btn-deal" id="btnDeal" onclick="dealThree()" disabled><span>Deal 3</span></button>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
